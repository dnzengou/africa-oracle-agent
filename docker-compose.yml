# Self-host on any African VPS (Hetzner, Vultr, Africa Data Centres, etc.)
# Usage: docker compose up -d
# Then:  curl http://localhost:8000/health
#
# No Redis, no Postgres, no shared state — stateless and free-tier viable.

services:
  oracle:
    build:
      context: .
      dockerfile: Dockerfile
    image: africa-oracle:local
    container_name: africa-oracle
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
